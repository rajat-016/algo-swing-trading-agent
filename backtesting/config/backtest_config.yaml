symbols:
  - RELIANCE.NS
  - TCS.NS
  - INFY.NS
  - HDFCBANK.NS
  - ICICIBANK.NS
  - WIPRO.NS
  - SBIN.NS
  - BHARTIARTL.NS

timeframe: 1d

data:
  db_path: data/market_data.duckdb
  start_date: "2019-01-01"
  end_date: "2026-01-01"

features:
  use_cached: true

labeling:
  lookahead_periods: 5
  return_threshold: 0.02

training:
  model_type: xgboost
  parameters:
    max_depth: 6
    learning_rate: 0.05
    n_estimators: 300
    subsample: 0.8
    colsample_bytree: 0.8
    min_child_weight: 3
    gamma: 0.1
    random_state: 42

walk_forward:
  train_window_years: 3
  test_window_months: 6
  step_months: 6

backtest:
  initial_capital: 100000
  position_size_pct: 0.10
  max_positions: 3
  stop_loss_pct: 0.03
  target_pct: 0.20
  slippage_pct: 0.001

model_selection:
  primary_metric: sharpe_ratio
  min_sharpe: 1.2
  max_drawdown: 0.20
  min_accuracy: 0.55

output:
  models_dir: models
  reports_dir: reports
  logs_dir: logs
  export_latest: true

logging:
  level: INFO
  file: logs/backtest.log
