symbols:
  - RELIANCE.NS
  - TCS.NS
  - INFY.NS
  - HDFCBANK.NS
  - ICICIBANK.NS
  - WIPRO.NS
  - SBIN.NS
  - BHARTIARTL.NS
  - BAJAJ-AUTO.NS
  - SUNPHARMA.NS
  - TECHM.NS
  - KOTAKBANK.NS
  - ADANIPORTS.NS
  - NESTLEIND.NS

timeframe: 1d

data:
  db_path: data/market_data.duckdb
  start_date: "2019-01-01"
  end_date: "2026-01-01"

features:
  use_cached: true

labeling:
  lookahead_periods: 5
  return_threshold: 0.10
  stop_loss: 0.03
  num_classes: 3
  atr_target_multiplier: 1.5
  atr_stop_multiplier: 1.0

training:
  model_type: xgboost
  num_classes: 3
  parameters:
    max_depth: 6
    learning_rate: 0.05
    n_estimators: 300
    subsample: 0.8
    colsample_bytree: 0.8
    min_child_weight: 3
    gamma: 0.1
    random_state: 42

walk_forward:
  train_window_years: 3
  test_window_months: 6
  step_months: 6

backtest:
  initial_capital: 100000
  position_size_pct: 0.10
  max_positions: 3
  stop_loss_pct: 0.03
  target_pct: 0.15
  slippage_pct: 0.001
  brokerage_rate: 0.0015
  stt_rate: 0.00025
  use_atr_sl: true
  atr_sl_multiplier: 1.5
  atr_target_multiplier: 3.0
  cooldown_bars: 3
  max_holding_bars: 7
  confidence_high: 0.65
  confidence_medium: 0.50
  portfolio_mode: false
  allocation_strategy: confidence_proportional

model_selection:
  primary_metric: sharpe_ratio
  min_sharpe: 1.2
  max_drawdown: 0.20
  min_trades: 5
  min_precision_buy: 0.55
  min_expectancy: 0.0

output:
  models_dir: models
  reports_dir: reports
  logs_dir: logs
  export_latest: true
  deploy_to_backend: true

logging:
  level: INFO
  file: logs/backtest.log
